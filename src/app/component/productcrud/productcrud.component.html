<h2>Product List</h2>
<div class="container">
    <div class="row">
        <div class="col-md-8 offset-2">
            <div class="form-group">
                <label for="productName">Product Name</label>
                <input #productName type="text " class="form-control">
            </div>

            <div class="form-group">
                <label for="Category">Category</label>
                <input #category type="text" class="form-control">
            </div>

            <div class="form-group">
                <label for="Price">Price</label>
                <input #price type="text " class="form-control">
            </div>

            <div class="form-group">
                <button *ngIf="!isInEditMode" (click)="OnAdd()" class="btn btn-outline-primary btn-block">Add
                    Product</button>
            </div>

            <div class="form-group">
                <button *ngIf="isInEditMode" (click)="OnUpdate()" class="btn btn-outline-primary btn-block">Update
                    Product</button>
            </div>


        </div>

    </div>
    <div class="row" *ngIf="productsArr.length>0;else noproduct">
        <div class="col-md-4 mt-2"  *ngFor="let prd of productsArr">
            <div class="card">
                    <div class="card-header" >
                        {{prd.productName}}
                    </div>
                    <div class="card-body">
                         {{prd.category}}
                         {{prd.price}}
                    </div>
                    <div class="card-footer d-flex justify-content-between ">
                          <button 
                          (click)="OnEdit(prd)"
                          class="btn btn-outline-primary ">
                                Edit
                          </button>
                          <button 
                          (click)="OnRmove(prd.id)"
                          class="btn btn-outline-danger ">
                                Remove
                          </button>
                    </div>
                </div>
            </div>
        </div>
    
    <ng-template #noproduct>
        <p class="alert alert-info">No Products</p>
    </ng-template>

</div>
