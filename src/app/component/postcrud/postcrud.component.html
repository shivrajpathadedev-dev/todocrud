<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 offset-md-3 mb-4 mb-md-4">
            <div class="card">
                <div class="card-body">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input #title type="text" class="form-control" id="title">
                    </div>

                    <div class="form-group">
                        <label for="body">body</label>
                        <textarea #body rows="4" class="form-control" id="body"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="userId">UserId</label>
                        <select #userId class="form-control" id="userId">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <button *ngIf="!isInEditMode" (click)="OnAdd()" class="btn-sm btn-block btn-outline-primary">Add
                        Post</button>
                    <button *ngIf="isInEditMode" (click)="OnUpadate()"
                        class="btn-sm btn-block btn-outline-primary">Update Post</button>
                </div>
            </div>
        </div>
    </div>
    <div class="row" *ngIf="postArr.length>0;else noPost">
        <div class="col-md-4 mt-3" *ngFor="let post of postArr">
            <div class="card h-100">
                <div class="card-header">
                    <h3>{{post.title}}</h3>
                </div>
                <div class="card-body">
                    <p class="m-0">{{post.body}}</p>
                </div>
                <div class="card-footer d-flex justify-content-between">
                    <button (click)="OnEdit(post)" class="btn btn-outline-primary btn-sm">Edit</button>
                    <button (click)="OnRemove(post.id)" class="btn btn-outline-danger btn-sm">Remove</button>
                </div>
            </div>
        </div>
    </div>

    <ng-template #noPost>
        <P class="alert alert-info">No Post</P>
    </ng-template>
</div>
