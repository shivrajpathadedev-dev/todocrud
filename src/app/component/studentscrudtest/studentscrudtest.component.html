
        <div class="row">
            <div class="col-md-4">
                <h2 class="mt-4">
                    {{isInEditMode ?'Update Student':'Add Student'}}
                </h2>
                <!-- <div class="main-container"> -->
                
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input #studentname type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="name">Age</label>
                        <input #studentage type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="name">Course</label>
                        <input #studentcourse type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <button (click)="Onadd()" *ngIf="!isInEditMode" class="btn btn-block btn-outline-primary">Add
                            Student</button>
                    </div>
                    <div class="form-group">
                        <button (click)="OnUpdate()" *ngIf="isInEditMode" class="btn btn-block btn-outline-primary">
                            Update Student</button>
                    </div>
                
            </div>


            <div class="col-md-8 mt-4">
                <mat-card class="table-responsive">
                    <table class="table table-bordered" *ngIf="studentsArr.length>0;else noStudent">
                        <thead>
                            <tr>
                                <th>Sr.No</th>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Course</th>
                                <th>Edit</th>
                                <th>Remove</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let std of studentsArr; let i=index; trackBy:trackByStudent">
                                <td>{{i+1}}</td>
                                <td>{{std.name}}</td>
                                <td>{{std.age}}</td>
                                <td>{{std.course}}</td>
                                <td class="text-center">
                                    <button (click)="OnEdit(std)" mat-mini-fab color="primary">
                                        <mat-icon>edit</mat-icon>
                                    </button>
                                </td>
                                <td class="text-center">
                                    <button (click)="OnRemove(std.id)" mat-mini-fab color="warn">
                                        <mat-icon>delete</mat-icon>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <ng-template #noStudent>
                        <p class="alert alert-info">No Student data added yet !!!</p>
                    </ng-template>
                </mat-card>
            </div>
        </div>
